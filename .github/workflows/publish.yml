name: Build and publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  # Monthly rebuild so apt security patches land in `latest` without a commit.
  schedule:
    - cron: "17 4 3 * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3008: apt package pinning — base image pin + monthly rebuilds
          # cover reproducibility; exact apt pins churn too fast on Debian.
          ignore: DL3008

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - uses: docker/setup-buildx-action@v3
      - name: Build image for testing (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cobe-linter:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run contract conformance tests
        run: go test -tags conformance ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # Scheduled rebuilds must not reuse cached apt layers — a cache hit
          # on `apt-get update && install` would defeat the security refresh.
          no-cache: ${{ github.event_name == 'schedule' }}
          cache-to: type=gha,mode=max
